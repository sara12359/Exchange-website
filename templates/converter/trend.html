{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Trends | Real-time Exchange Rates</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            margin-top: 2.5rem;
            background: var(--input-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }
        .trend-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .time-period-selector {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle brightness">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <div class="container">
        <div class="nav-links">
            <a href="{% url 'index' %}" class="nav-link">Converter</a>
            <a href="{% url 'currency_trend' %}" class="nav-link active">Trends</a>
        </div>

        <div class="card">
            <h1>Currency Trends</h1>
            <p class="subtitle">Historical exchange rate analysis</p>

            <form method="GET">
                <div class="trend-controls">
                    <div class="form-group">
                        <label for="from_currency">From</label>
                        <select name="from" id="from_currency" required>
                            {% for code, name in currencies %}
                                <option value="{{ code }}" {% if from_curr == code %}selected{% endif %}>
                                    {{ code }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="to_currency">To</label>
                        <select name="to" id="to_currency" required>
                            {% for code, name in currencies %}
                                <option value="{{ code }}" {% if to_curr == code %}selected{% endif %}>
                                    {{ code }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group time-period-selector">
                        <label for="days">Time Period</label>
                        <select name="days" id="days">
                            <option value="7" {% if days == 7 %}selected{% endif %}>Last 7 Days</option>
                            <option value="14" {% if days == 14 %}selected{% endif %}>Last 14 Days</option>
                            <option value="30" {% if days == 30 %}selected{% endif %}>Last 30 Days</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="convert-btn">Update Analysis</button>
            </form>

            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <footer>
            &copy; 2026 Currency Converter. Data provided by ExchangeRate-API & Fawaz Ahmed API.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const labels = {{ labels_json|safe }};
            const dataValues = {{ historical_rates_json|safe }};
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const primaryColor = '#6366f1';
            const textColor = isDark ? '#94a3b8' : '#475569';
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `1 {{ from_curr }} to {{ to_curr }}`,
                        data: dataValues,
                        borderColor: primaryColor,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: primaryColor,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: isDark ? 'rgba(15, 23, 42, 0.98)' : 'rgba(255, 255, 255, 0.98)',
                            titleColor: isDark ? '#f8fafc' : '#0f172a',
                            bodyColor: isDark ? '#94a3b8' : '#475569',
                            borderColor: isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(99, 102, 241, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            cornerRadius: 12,
                            bodyFont: {
                                family: "'Inter', sans-serif",
                                size: 13,
                                weight: '500'
                            },
                            titleFont: {
                                family: "'Inter', sans-serif",
                                size: 12,
                                weight: '700'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: gridColor,
                                borderDash: [5, 5]
                            },
                            ticks: {
                                color: textColor,
                                font: {
                                    family: "'JetBrains Mono', monospace",
                                    size: 11
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: textColor,
                                maxRotation: 45,
                                minRotation: 45,
                                font: {
                                    family: "'Inter', sans-serif",
                                    size: 10,
                                    weight: '600'
                                }
                            }
                        }
                    }
                }
            });

            // Make chart container responsive height
            const chartCanvas = document.getElementById('trendChart');
            chartCanvas.style.height = '300px';
        });
    </script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
